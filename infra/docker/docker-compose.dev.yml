version: "3.9"

# ============================================================
# NAT Project — Development override
# Run: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# ============================================================

services:
  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  minio:
    ports:
      - "9000:9000"
      - "9001:9001"

  n8n:
    ports:
      - "5678:5678"

  # api and web run locally via pnpm dev in dev mode — not via docker
