version: "3.9"

# ============================================================
# NAT Project — Production Docker Compose
# ============================================================

networks:
  natnet:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  n8n_data:

services:
  # ---- PostgreSQL ----
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks: [natnet]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-natproject}
      POSTGRES_USER: ${POSTGRES_USER:-natuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-natpassword}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-natuser}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  # ---- Redis ----
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks: [natnet]
    volumes:
      - redis_data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispassword} --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD:-redispassword}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${REDIS_PORT:-6379}:6379"

  # ---- MinIO (S3 compatible) ----
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    networks: [natnet]
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"

  # ---- n8n Workflow Automation ----
  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    networks: [natnet]
    volumes:
      - n8n_data:/home/node/.n8n
    environment:
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://localhost:5678}
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD:-changeme}
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-natuser}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:-natpassword}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${N8N_PORT:-5678}:5678"

  # ---- NestJS API ----
  api:
    build:
      context: ../apps/api
      dockerfile: ../../infra/docker/Dockerfile.api
    restart: unless-stopped
    networks: [natnet]
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-natuser}:${POSTGRES_PASSWORD:-natpassword}@postgres:5432/${POSTGRES_DB:-natproject}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispassword}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      CORS_ORIGIN: ${APP_URL:-http://localhost:3000}
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: ${S3_BUCKET:-natproject}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    ports:
      - "${API_PORT:-3001}:3001"

  # ---- Next.js Web ----
  web:
    build:
      context: ../apps/web
      dockerfile: ../../infra/docker/Dockerfile.web
    restart: unless-stopped
    networks: [natnet]
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:3001}
      NEXT_PUBLIC_WS_URL: ${WS_URL:-ws://localhost:3001}
      NEXTAUTH_URL: ${APP_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-3000}:3000"
